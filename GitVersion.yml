mode: Mainline
tag-prefix: 'v'

assembly-versioning-scheme: MajorMinorPatch

branches:
  main:
    regex: ^main$
    increment: None
    tag: ''
    prevent-increment-of-merged-branch-version: false
    
  develop:
    regex: ^dev(elop)?$
    increment: Minor
    tag: 'beta'
    prevent-increment-of-merged-branch-version: false
    
  feature:
    regex: ^feature[/-]
    increment: Patch
    tag: 'build'
    
  release:
    regex: ^release[/-]
    increment: Inherit
    tag: 'rc'
assembly-versioning-scheme: MajorMinorPatch
mode: ContinuousDeployment
branches:
  main:
    regex: ^main$
    increment: Patch
    tag: ''
    prevent-increment-of-merged-branch-version: true
  dev:
    regex: ^dev$
    increment: Minor
    tag: beta
  feature:
    regex: ^features?[/-]
    increment: Minor
    tag: alpha
ignore:
  sha: []

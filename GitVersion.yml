mode: Mainline
next-version: 0.0.0
tag-prefix: ''

assembly-versioning-scheme: MajorMinorPatch

branches:
  main:
    increment: Patch       # main merge → patch artsın
  dev:
    increment: Minor       # develop merge → minor artsın
  feature:
    increment: Inherit     # default davranış (istersen Patch de diyebilirsin)
  release:
    increment: Major
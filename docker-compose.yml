
services:
  nuxt:
    build: ./examples/nuxt
    container_name: nuxt
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_MESSTICK_API_URL=https://example.com/api
      - NUXT_PUBLIC_LINBIK_URL=https://example.com/api
      - LINBIK_APP_ID=01956070-9f16-7791-a93e-c09c3735f3ae
      - LINBIK_APP_
      - NUXT_PUBLIC_API_URL=https://example.com/api
      - SECRET_KEY=your_secret_key_here
    volumes:
      - node_modules:/app/node_modules

volumes:
  node_modules: